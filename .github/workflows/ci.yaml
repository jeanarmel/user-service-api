name: Docker CI with Github Actions

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Extract branch name
              shell: bash
              run: echo "branch=${GITHUB_REF_NAME//\//-}" >> $GITHUB_OUTPUT
              id: get_branch

            - name: Build and push
              uses: docker/build-push-action@v5
              with:
                  context: .
                  push: true
                  # Tags the image with the branch name (e.g., my-user/my-app:main or my-user/my-app:feature-1)
                  tags: |
                      ${{ secrets.DOCKER_USERNAME }}/node-mongo-app:latest
                      ${{ secrets.DOCKER_USERNAME }}/node-mongo-app:${{ steps.get_branch.outputs.branch }}
